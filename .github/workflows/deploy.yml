name: ci-cd

on:
  push:
    branches: [main, master]
  workflow_dispatch: {}

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          OPENAI_API_KEY: sk-test-ci
          SECRETS_SOURCE: env
          ENVIRONMENT: test
        run: pytest -q

  build-push-deploy:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
      K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          IMAGE_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"
          echo "IMAGE_URI=${IMAGE_URI}" >> "$GITHUB_ENV"
          docker build -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --name "${EKS_CLUSTER_NAME}" --region "${AWS_REGION}"

      - name: Render deployment image
        run: |
          set -euo pipefail
          sed -i.bak "s|REPLACE_IMAGE_URI|${IMAGE_URI}|g" deployment/k8s/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          set -euo pipefail
          kubectl apply -f deployment/k8s/namespace.yaml
          kubectl apply -f deployment/k8s/serviceaccount.yaml
          kubectl apply -f deployment/k8s/configmap.yaml
          kubectl apply -f deployment/k8s/service.yaml
          kubectl apply -f deployment/k8s/deployment.yaml

      - name: Verify rollout
        run: |
          set -euo pipefail
          kubectl rollout status deployment/support-ops-agent -n "${K8S_NAMESPACE}" --timeout=5m
